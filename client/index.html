<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>MicroChat</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .message { margin: 5px 0; padding: 5px; background: #f0f0f0; border-radius: 4px; }
        input, button { padding: 8px; margin: 5px 0; }
        #messageInput { width: 70%; }
        button { cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
<h1>MicroChat</h1>

<!-- Meddelandelista -->
<div id="messages"></div>

<!-- Formulär för att skicka meddelanden -->
<input type="text" id="messageInput" placeholder="Skriv ett meddelande..." />
<button onclick="sendMessage()">Skicka</button>
<button onclick="loadMessages()">Uppdatera</button>

<script>
    // BFF-adressen som alla anrop går igenom
    const BFF_URL = "http://localhost:8080";

    // Hämta alla meddelanden från BFF -> message-service
    async function loadMessages() {
        try {
            const response = await fetch(`${BFF_URL}/api/messages`, {
                credentials: "include" // Skicka med session-cookie
            });
            const messages = await response.json();
            const container = document.getElementById("messages");
            container.innerHTML = "";
            messages.forEach(msg => {
                const div = document.createElement("div");
                div.className = "message";
                div.textContent = `${msg.sender}: ${msg.content}`;
                container.appendChild(div);
            });
        } catch (err) {
            console.error("Kunde inte hämta meddelanden:", err);
        }
    }

    // Skicka ett meddelande via BFF -> message-service
    async function sendMessage() {
        const input = document.getElementById("messageInput");
        const content = input.value.trim();
        if (!content) return;

        try {
            await fetch(`${BFF_URL}/api/messages`, {
                method: "POST",
                credentials: "include", // Skicka med session-cookie
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ sender: "adam", content: content })
            });
            input.value = "";
            loadMessages(); // Uppdatera listan efter skickat meddelande
        } catch (err) {
            console.error("Kunde inte skicka meddelande:", err);
        }
    }

    // Ladda meddelanden när sidan öppnas
    loadMessages();
</script>
</body>
</html>
