server.port=8080
spring.application.name=bff

spring.security.oauth2.client.registration.bff-client.client-id=bff-client
spring.security.oauth2.client.registration.bff-client.client-secret=secret
spring.security.oauth2.client.registration.bff-client.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.bff-client.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.bff-client.scope=openid,profile

spring.security.oauth2.client.provider.bff-client.issuer-uri=http://127.0.0.1:9000

resilience4j.circuitbreaker.instances.messageService.sliding-window-size=5
resilience4j.circuitbreaker.instances.messageService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.messageService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.messageService.permitted-number-of-calls-in-half-open-state=2